apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocluster
  namespace: argocd
spec:
  destination:
    namespace: dev
    server: https://kubernetes.default.svc
  source:
    path: confs
    repoURL: https://github.com/ValiSpac/IoT-vpac.git
    targetRevision: HEAD
    directory:
      recurse: false
  project: default
  syncPolicy:
    automated:
      prune: true 
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

